version: '3.8'

services:
  # ==================== PostgreSQL 数据库 ====================
  postgres:
    image: postgres:15-alpine
    container_name: job-tracker-db
    restart: always
    environment:
      POSTGRES_DB: jobtracker
      POSTGRES_USER: ${PG_USER:-postgres}
      POSTGRES_PASSWORD: ${PG_PASSWORD:?PG_PASSWORD is required}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${PG_USER:-postgres} -d jobtracker"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - job-tracker-net

  # ==================== 应用服务 ====================
  job-tracker:
    image: ${DOCKER_USERNAME}/job-tracker:latest
    container_name: job-tracker
    restart: always
    ports:
      - "3001:3001"
    volumes:
      - ./uploads:/app/uploads
    environment:
      # 运行环境
      - NODE_ENV=production
      - PORT=3001
      
      # 数据库配置
      - PG_HOST=postgres
      - PG_PORT=5432
      - PG_DATABASE=jobtracker
      - PG_USER=${PG_USER:-postgres}
      - PG_PASSWORD=${PG_PASSWORD:?PG_PASSWORD is required}
      
      # JWT 配置
      - JWT_SECRET=${JWT_SECRET:?JWT_SECRET is required}
      
      # GitHub OAuth
      - GITHUB_CLIENT_ID=${GITHUB_CLIENT_ID:?GITHUB_CLIENT_ID is required}
      - GITHUB_CLIENT_SECRET=${GITHUB_CLIENT_SECRET:?GITHUB_CLIENT_SECRET is required}
      - GITHUB_CALLBACK_URL=${GITHUB_CALLBACK_URL}
      - CLIENT_URL=${CLIENT_URL}
      
      # OCR 服务
      - OCR_PROVIDER=${OCR_PROVIDER:-qwen}
      - LLM_API_URL=${LLM_API_URL}
      - LLM_API_KEY=${LLM_API_KEY}
      - LLM_MODEL=${LLM_MODEL:-glm-5}
      - GLM_API_KEY=${GLM_API_KEY}
      - GLM_MODEL=${GLM_MODEL:-glm-4v-flash}
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3001/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s
    networks:
      - job-tracker-net

# ==================== 网络 ====================
networks:
  job-tracker-net:
    driver: bridge

# ==================== 数据卷 ====================
volumes:
  postgres_data:

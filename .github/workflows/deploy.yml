name: 🚀 Build and Deploy Job Tracker

on:
  push:
    branches: [ main ]
  workflow_dispatch:

env:
  REGISTRY: docker.io
  IMAGE_NAME: job-tracker

jobs:
  # ============================================
  # 1. 构建并推送 Docker 镜像
  # ============================================
  build:
    name: 🏗️ Build Docker Image
    runs-on: ubuntu-latest

    steps:
    - name: 📥 Checkout Code
      uses: actions/checkout@v4

    - name: 🔑 Login to Docker Hub
      uses: docker/login-action@v3
      with:
        username: ${{ secrets.DOCKER_USERNAME }}
        password: ${{ secrets.DOCKER_PASSWORD }}

    - name: 🏷️ Generate Tags
      id: meta
      uses: docker/metadata-action@v5
      with:
        images: ${{ env.REGISTRY }}/${{ secrets.DOCKER_USERNAME }}/${{ env.IMAGE_NAME }}
        tags: |
          type=sha,prefix=
          type=ref,event=branch
          latest

    - name: 🏗️ Build and Push
      uses: docker/build-push-action@v5
      with:
        context: .
        file: ./Dockerfile
        push: true
        tags: ${{ steps.meta.outputs.tags }}
        labels: ${{ steps.meta.outputs.labels }}

  # ============================================
  # 2. 部署到服务器
  # ============================================
  deploy:
    name: 🚀 Deploy to Server
    runs-on: ubuntu-latest
    needs: [build]

    steps:
    - name: 🚀 Deploy via SSH
      uses: appleboy/ssh-action@master
      with:
        host: ${{ secrets.SERVER_HOST }}
        username: ${{ secrets.SERVER_USER }}
        password: ${{ secrets.SERVER_PASSWORD }}
        port: 22
        script: |
          set -e

          echo "=========================================="
          echo "🚀 Job Tracker 部署开始"
          echo "=========================================="

          cd /opt/job-tracker

          # 创建 .env 文件
          echo "📝 创建环境配置..."
          cat > .env << EOF
          # 数据库配置
          PG_HOST=postgres
          PG_PORT=5432
          PG_DATABASE=jobtracker
          PG_USER=${{ secrets.PG_USER }}
          PG_PASSWORD=${{ secrets.PG_PASSWORD }}

          # JWT 配置
          JWT_SECRET=${{ secrets.JWT_SECRET }}

          # GitHub OAuth
          GITHUB_CLIENT_ID=${{ secrets.GITHUB_CLIENT_ID }}
          GITHUB_CLIENT_SECRET=${{ secrets.GITHUB_CLIENT_SECRET }}
          GITHUB_CALLBACK_URL=http://${{ secrets.SERVER_HOST }}:3001/api/login/githubCallBack
          CLIENT_URL=http://${{ secrets.SERVER_HOST }}:3001

          # OCR 配置
          OCR_PROVIDER=${{ secrets.OCR_PROVIDER }}
          LLM_API_KEY=${{ secrets.LLM_API_KEY }}
          LLM_API_URL=${{ secrets.LLM_API_URL }}
          LLM_MODEL=${{ secrets.LLM_MODEL }}
          EOF

          # 拉取最新镜像
          echo "📋 拉取最新 Docker 镜像..."
          docker pull ${{ secrets.DOCKER_USERNAME }}/job-tracker:latest
          docker pull postgres:15-alpine

          # 停止旧服务
          echo "🛑 停止旧服务..."
          docker compose -f docker-compose.prod.yml down || true

          # 使用 docker compose 部署
          echo "🚀 启动服务..."
          export DOCKER_USERNAME=${{ secrets.DOCKER_USERNAME }}
          export PG_USER=${{ secrets.PG_USER }}
          export PG_PASSWORD=${{ secrets.PG_PASSWORD }}
          docker compose -f docker-compose.prod.yml up -d

          echo "✅ 容器启动成功"

          # 等待服务启动
          echo "⏳ 等待服务启动..."
          sleep 15

          # 检查容器状态
          echo "📊 检查容器状态..."
          docker compose -f docker-compose.prod.yml ps

          # 健康检查
          echo "🧪 执行健康检查..."
          for i in {1..5}; do
            if curl -s http://localhost:3001/api/health > /dev/null 2>&1; then
              echo "✅ 服务健康检查通过"
              break
            fi
            if [ $i -eq 5 ]; then
              echo "⚠️ 服务健康检查失败，查看日志..."
              docker compose -f docker-compose.prod.yml logs --tail=100
              exit 1
            fi
            echo "⏳ 等待服务就绪... ($i/5)"
            sleep 5
          done

          # 检查数据库连接
          echo "📊 检查数据库连接..."
          docker exec job-tracker-db pg_isready -U ${PG_USER:-postgres} -d jobtracker && echo "✅ 数据库连接正常" || echo "⚠️ 数据库连接异常"

          echo ""
          echo "=========================================="
          echo "✅ 部署完成！"
          echo "=========================================="
          echo "访问地址: http://${{ secrets.SERVER_HOST }}:3001"
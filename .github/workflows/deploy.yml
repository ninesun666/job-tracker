name: 🚀 Build and Deploy Job Tracker

on:
  push:
    branches: [ main ]
  workflow_dispatch:

env:
  REGISTRY: docker.io
  IMAGE_NAME: job-tracker

jobs:
  # ============================================
  # 1. 构建并推送 Docker 镜像
  # ============================================
  build:
    name: 🏗️ Build Docker Image
    runs-on: ubuntu-latest

    steps:
    - name: 📥 Checkout Code
      uses: actions/checkout@v4

    - name: 🔑 Login to Docker Hub
      uses: docker/login-action@v3
      with:
        username: ${{ secrets.DOCKER_USERNAME }}
        password: ${{ secrets.DOCKER_PASSWORD }}

    - name: 🏷️ Generate Tags
      id: meta
      uses: docker/metadata-action@v5
      with:
        images: ${{ env.REGISTRY }}/${{ secrets.DOCKER_USERNAME }}/${{ env.IMAGE_NAME }}
        tags: |
          type=sha,prefix=
          type=ref,event=branch
          latest

    - name: 🏗️ Build and Push
      uses: docker/build-push-action@v5
      with:
        context: .
        file: ./Dockerfile
        push: true
        tags: ${{ steps.meta.outputs.tags }}
        labels: ${{ steps.meta.outputs.labels }}

  # ============================================
  # 2. 部署到服务器
  # ============================================
  deploy:
    name: 🚀 Deploy to Server
    runs-on: ubuntu-latest
    needs: [build]

    steps:
    - name: 🚀 Deploy via SSH
      uses: appleboy/ssh-action@master
      with:
        host: ${{ secrets.SERVER_HOST }}
        username: ${{ secrets.SERVER_USER }}
        password: ${{ secrets.SERVER_PASSWORD }}
        port: 22
        script: |
          set -e

          echo "=========================================="
          echo "🚀 Job Tracker 部署开始"
          echo "=========================================="

          # 创建目录
          mkdir -p /opt/job-tracker
          cd /opt/job-tracker

          # 拉取最新镜像
          echo "📋 拉取最新 Docker 镜像..."
          docker pull ${{ secrets.DOCKER_USERNAME }}/job-tracker:latest

          # 停止旧容器
          echo "🛑 停止旧容器..."
          docker stop job-tracker 2>/dev/null || true
          docker rm job-tracker 2>/dev/null || true

          # 启动新容器
          echo "🚀 启动新容器..."
          docker run -d \
            --name job-tracker \
            --restart always \
            -p 3001:3001 \
            -v /opt/job-tracker/data:/app/data \
            -v /opt/job-tracker/uploads:/app/uploads \
            -e NODE_ENV=production \
            -e PORT=3001 \
            -e OCR_PROVIDER=qwen \
            -e LLM_API_URL=https://coding.dashscope.aliyuncs.com/v1/chat/completions \
            -e LLM_API_KEY=${{ secrets.LLM_API_KEY }} \
            -e LLM_MODEL=kimi-k2.5 \
            ${{ secrets.DOCKER_USERNAME }}/job-tracker:latest

          echo "✅ 容器启动成功"

          # 等待服务启动
          echo "⏳ 等待服务启动..."
          sleep 10

          # 检查容器状态
          echo "📊 检查容器状态..."
          docker ps | grep job-tracker

          # 健康检查
          echo "🧪 执行健康检查..."
          if curl -s http://localhost:3001/ > /dev/null 2>&1; then
            echo "✅ 服务健康检查通过"
          else
            echo "⚠️ 服务健康检查失败，查看日志..."
            docker logs job-tracker --tail=50
          fi

          echo ""
          echo "=========================================="
          echo "✅ 部署完成！"
          echo "=========================================="
          echo "访问地址: http://${{ secrets.SERVER_HOST }}:3001"